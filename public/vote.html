<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>첫째와둘째 – 실시간 투표</title>
<link rel="icon" type="image/png" href="/logo.png"/>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111111;
  --surface:#1c1c1c;
  --surface2:#252525;
  --border:rgba(255,255,255,.08);
  --accent:#2ecc71;
  --accent2:#27ae60;
  --text:#f0effe;
  --text2:#888888;
  --text3:#4a4a4a;
  --radius:14px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{
  content:'';position:fixed;inset:0;
  background:none;
  pointer-events:none;z-index:0;
}
.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:36px 26px 80px}

/* 헤더 */
.header{text-align:center;margin-bottom:40px;position:relative;padding-top:56px}
.header-badge{position:absolute;top:0;left:0;display:inline-flex;align-items:center;gap:10px;padding:9px 16px;border-radius:20px;background:rgba(255,255,255,.06);font-size:16px;font-weight:800;color:#ccc;letter-spacing:.4px}
.brand-logo{width:26px;height:26px;border-radius:7px;object-fit:cover;display:block}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.header h1{font-size:44px;font-weight:900;letter-spacing:-.7px;margin-bottom:10px}
.header p{font-size:22px;color:#888}

/* 상태 바 */
.status-bar{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;background:#1a1a1a;border:1px solid rgba(255,255,255,.07);border-radius:var(--radius);margin-bottom:28px;gap:16px;flex-wrap:wrap}
.status-left{display:flex;align-items:center;gap:10px}
.ws-dot{width:14px;height:14px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
.ws-dot.on{background:#2ecc71;box-shadow:0 0 10px #2ecc71;animation:blink 1.4s infinite}
.ws-dot.err{background:#ef4444}
#ws-label{font-size:18px;font-weight:700;color:#888}
.status-right{display:flex;gap:8px;flex-wrap:wrap}
.status-right.center{justify-content:center;width:100%}

/* 버튼 */
.btn{padding:12px 22px;border-radius:10px;font-size:18px;font-weight:800;font-family:inherit;cursor:pointer;border:none;transition:opacity .15s,transform .1s;letter-spacing:.2px}
.btn:hover{opacity:.85}.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(46,204,113,.3)}
.btn-danger{background:#ef4444;color:#fff}
.btn-ghost{background:#2a2a2a;color:#888;border:1px solid rgba(255,255,255,.1)}

/* 카드 */
.card{background:var(--surface);border:1px solid rgba(255,255,255,.07);border-radius:var(--radius);padding:28px;margin-bottom:24px;box-shadow:var(--shadow)}
.card-title{font-size:20px;font-weight:800;color:#4a4a4a;letter-spacing:.4px;margin-bottom:18px}
.vote-title-input{width:100%;padding:10px 0;background:transparent;border:none;border-bottom:2px solid #2ecc71;color:#fff;font-size:32px;font-weight:900;font-family:'Pretendard',sans-serif;outline:none;letter-spacing:-.5px;transition:border-color .2s;display:block;margin-bottom:24px}
.vote-title-input:focus{border-color:#2ecc71}
.vote-title-input::placeholder{color:#2a2a2a}

/* 항목 입력 */
.option-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.option-num{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#fff;font-size:15px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.option-input{flex:1;padding:14px 16px;background:#2a2a2a;border:1.5px solid rgba(255,255,255,.1);border-radius:10px;color:var(--text);font-size:22px;font-family:inherit;outline:none;transition:border-color .15s;font-weight:700}
.option-input:focus{border-color:rgba(255,255,255,.3)}
.option-input::placeholder{color:#4a4a4a}
.btn-remove-opt{width:34px;height:34px;border-radius:50%;background:transparent;border:1px solid rgba(255,255,255,.1);color:#555;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.btn-remove-opt:hover{background:#ef4444;border-color:#ef4444;color:#fff}

/* 통계 */
.stat-row{display:flex;gap:16px;margin-bottom:24px}
.stat-box{flex:1;background:#1e1e1e;border:1px solid rgba(255,255,255,.08);border-radius:var(--radius);padding:16px;text-align:center}
.stat-num{font-size:44px;font-weight:900;color:var(--text)}
.stat-label{font-size:16px;color:#4a4a4a;margin-top:6px;font-weight:700;letter-spacing:.5px}

/* 투표 결과 */
.vote-item{margin-bottom:18px;cursor:pointer}
.vote-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.vote-item-name{font-size:22px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:10px}
.vote-badge{width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vote-count{font-size:19px;font-weight:800;color:#888}
.vote-bar-wrap{height:14px;background:#2a2a2a;border-radius:20px;overflow:hidden}
.vote-bar{height:100%;border-radius:20px;transition:width .5s cubic-bezier(.4,0,.2,1);min-width:0}
.vote-item.first .vote-item-name{color:#fbbf24}
.vote-item.first .vote-badge{background:linear-gradient(135deg,#f59e0b,#fbbf24)}
.vote-item.first .vote-bar{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.vote-item:not(.first) .vote-bar{background:linear-gradient(90deg,var(--accent),var(--accent2))}

/* 팝업 */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:1000;padding:24px}
.modal.show{display:flex}
.modal-box{width:min(920px,95vw);max-height:80vh;overflow:auto;background:#1e1e1e;border:1px solid rgba(255,255,255,.09);border-radius:16px;box-shadow:var(--shadow);padding:24px}
.modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
.modal-title{font-size:24px;font-weight:900;color:var(--text)}
.modal-close{background:transparent;color:#888;border:1px solid rgba(255,255,255,.1);width:42px;height:42px;border-radius:50%;font-size:26px;cursor:pointer;line-height:1}
.modal-voters{display:flex;flex-wrap:wrap;gap:10px}
.modal-empty{color:#4a4a4a;font-size:18px}

/* ── 투표 애니메이션 스테이지 ── */
.ballot-stage{
  position:relative;
  height:260px;
  border-radius:12px;
  background:linear-gradient(180deg,rgba(0,229,100,.10),rgba(0,229,100,.02));
  overflow:hidden;
  border:1px solid rgba(255,255,255,.07);
}
.ballot-hint{font-size:16px;color:#888;margin-top:14px;text-align:center}

/* 투표함 */
/* 쌓인 투표용지 더미 */
.pile-wrap{
  position:absolute;
  bottom:0;left:0;right:0;
  height:200px;
  z-index:2;
  pointer-events:none;
}
.pile-paper{
  position:absolute;
  bottom:0;
  width:44px;height:58px;
  border-radius:3px 3px 2px 2px;
  background:linear-gradient(170deg,#ffffff,#eeeeee);
  border:1px solid rgba(0,0,0,.1);
  box-shadow:0 2px 8px rgba(0,0,0,.28);
  transform-origin:bottom center;
}
.pile-paper::after{
  content:'';
  position:absolute;
  top:8px;left:6px;right:6px;height:2px;
  background:rgba(0,0,0,.1);border-radius:2px;
  box-shadow:0 5px 0 rgba(0,0,0,.06),0 10px 0 rgba(0,0,0,.04);
}

/* 떨어지는 투표용지 */
.ballot-fly{
  position:absolute;
  width:44px;height:58px;
  border-radius:3px 3px 2px 2px;
  background:linear-gradient(170deg,#ffffff,#eeeeee);
  border:1px solid rgba(0,0,0,.1);
  box-shadow:0 6px 18px rgba(0,0,0,.3);
  z-index:10;
  pointer-events:none;
}
.ballot-fly::after{
  content:'';
  position:absolute;
  top:8px;left:6px;right:6px;height:2px;
  background:rgba(0,0,0,.1);border-radius:2px;
  box-shadow:0 5px 0 rgba(0,0,0,.06),0 10px 0 rgba(0,0,0,.04);
}

/* 빈 상태 */
.empty{text-align:center;padding:40px 20px;color:#4a4a4a}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.4}

/* 토스트 */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#1e1e1e;border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:12px 20px;font-size:13px;font-weight:600;color:var(--text);box-shadow:var(--shadow);transition:transform .3s;z-index:999;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* 당첨자 뽑기 */
.voter-chip{position:relative;padding:8px 14px;border-radius:999px;background:#2a2a2a;border:1.5px solid rgba(255,255,255,.1);font-size:15px;color:#ccc;cursor:default;transition:background .15s,border-color .15s,color .15s}
.voter-chip.lit{background:#2ecc71;border-color:#2ecc71;color:#000;font-weight:800;box-shadow:0 0 16px rgba(46,204,113,.7)}
.voter-chip.won{background:#1a6e3e;border-color:#2ecc71;color:#2ecc71;font-weight:800;opacity:.7;text-decoration:line-through}
.voter-chip.won-cancelled{background:#2a2a2a;border-color:#555;color:#555;font-weight:800;opacity:.5;text-decoration:line-through}
.btn-raffle{padding:10px 20px;border-radius:10px;font-size:16px;font-weight:800;font-family:inherit;cursor:pointer;border:none;background:linear-gradient(135deg,#f59e0b,#f97316);color:#fff;box-shadow:0 2px 12px rgba(245,158,11,.4);transition:opacity .15s,transform .1s}
.btn-raffle:hover{opacity:.88}.btn-raffle:active{transform:scale(.97)}
.btn-raffle:disabled{opacity:.4;cursor:not-allowed}

/* 당첨 결과 오버레이 */
.winner-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000;opacity:0;transition:opacity .4s;pointer-events:none}
.winner-overlay.show{opacity:1;pointer-events:all}
.winner-crown{font-size:72px;margin-bottom:12px;animation:crown-bounce .6s ease infinite alternate}
@keyframes crown-bounce{from{transform:translateY(0) scale(1)}to{transform:translateY(-10px) scale(1.08)}}
.winner-label{font-size:18px;font-weight:700;color:#f59e0b;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.winner-name{font-size:64px;font-weight:900;color:#fff;text-align:center;padding:0 32px;letter-spacing:-1px;animation:winner-pop .5s cubic-bezier(.175,.885,.32,1.275) both}
@keyframes winner-pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.winner-option{font-size:20px;color:#888;margin-top:10px}
.winner-close{padding:12px 36px;border-radius:12px;font-size:18px;font-weight:800;font-family:inherit;cursor:pointer;border:none;background:#2ecc71;color:#000;box-shadow:0 2px 16px rgba(46,204,113,.4)}
.winner-close:hover{opacity:.88}
.winner-chat-wrap{margin-top:28px;width:min(540px,90vw)}
.winner-chat-feed{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:16px 20px;height:150px;overflow-y:auto;display:flex;flex-direction:column;justify-content:center}
.winner-chat-feed::-webkit-scrollbar{width:3px}.winner-chat-feed::-webkit-scrollbar-thumb{background:#444;border-radius:3px}
.winner-chat-msg{font-size:24px;font-weight:700;color:#fff;text-align:center;line-height:1.7;animation:fadein .3s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:480px){
  .header{padding-top:0}
  .header-badge{position:static;margin:0 auto 14px auto}
  .header h1{font-size:30px}.header p{font-size:16px}
  .stat-num{font-size:28px}
  .wrap{padding:20px 14px 50px}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div class="header-badge"><img class="brand-logo" src="/logo.png" alt="첫째와둘째 로고"/>첫째와둘째</div>
    <h1>🗳 실시간 채팅 투표</h1>
    <p>채팅창에 <strong>!투표숫자</strong> 또는 <strong>!투표 숫자</strong> 를 입력하세요</p>
  </div>

  <div class="card" id="setup-card">
    <input id="vote-title-input" class="vote-title-input" placeholder="투표 제목을 입력하세요" autocomplete="off"/>
    <div id="options-wrap"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-ghost" onclick="addOption()" style="flex:1">＋ 항목 추가</button>
    </div>
  </div>

  <div class="status-bar" id="control-card">
    <div class="status-left">
      <div class="ws-dot" id="ws-dot"></div>
      <span id="ws-label">연결 안됨</span>
    </div>
    <div class="status-right" id="status-right">
      <button class="btn btn-primary" id="btn-start" onclick="startVote()">▶ 투표 시작</button>
      <button class="btn btn-ghost" id="btn-reset" onclick="resetVote()">🗑 초기화</button>
      <button class="btn btn-danger" id="btn-end" onclick="endVote()" style="display:none">⏹ 투표 중지</button>
      <button class="btn" id="btn-test" onclick="toggleTestMode()" style="background:#333;color:#888;border:1px solid rgba(255,255,255,.1)">🧪 테스트</button>
    </div>
  </div>

  <div class="card" id="anim-card" style="display:none">
    <div class="card-title">🗳 투표 진행 중</div>
    <div class="ballot-stage" id="ballot-stage">
      <div class="pile-wrap" id="pile-wrap"></div>
    </div>
    <div class="ballot-hint">투표가 들어올 때마다 투표용지가 떨어져요</div>
  </div>

  <div class="stat-row" id="stat-row">
    <div class="stat-box">
      <div class="stat-num" id="total-votes">0</div>
      <div class="stat-label">총 투표수</div>
    </div>
  </div>

  <div class="card" id="results-card">
    <div class="card-title">결과</div>
    <div id="results"></div>
  </div>

</div>

<div class="modal" id="voter-modal" onclick="onModalBackdrop(event)">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">투표자 목록</div>
      <div style="display:flex;gap:10px;align-items:center">
        <button class="btn-raffle" id="btn-raffle" onclick="startRaffle()">🎰 당첨자 뽑기</button>
        <button class="modal-close" onclick="closeVoterModal()" aria-label="닫기">×</button>
      </div>
    </div>
    <div class="modal-voters" id="modal-voters"></div>
  </div>
</div>

<!-- 당첨 결과 오버레이 -->
<div class="winner-overlay" id="winner-overlay">
  <div class="winner-crown">🏆</div>
  <div class="winner-label">🎉 당첨자 🎉</div>
  <div class="winner-name" id="winner-name"></div>
  <div class="winner-option" id="winner-option"></div>
  <div class="winner-chat-wrap">
    <div class="winner-chat-feed" id="winner-chat-feed"></div>
  </div>
  <div style="display:flex;gap:14px;margin-top:32px">
    <button class="winner-close" style="background:#333;color:#aaa;box-shadow:none" onclick="cancelWinner()">✕ 취소</button>
    <button class="winner-close" onclick="closeWinner()">✓ 확인</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
import { getFirestore, collection, addDoc, doc, updateDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js';

const _app = initializeApp({
  apiKey:'AIzaSyCe3izM-r1ljlhO5YKyBe_3jEHvXxHy7Yw',
  authDomain:'firstandsecond-b449c.firebaseapp.com',
  projectId:'firstandsecond-b449c',
  storageBucket:'firstandsecond-b449c.firebasestorage.app',
  messagingSenderId:'794631097887',
  appId:'1:794631097887:web:e03fe5f49915f4c741cf2a'
});
const _db = getFirestore(_app);
let _voteDocId = null;

async function upsertVoteResult(title, winnersArr, startedAt){
  const today = new Date();
  const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
  const startTime = startedAt ? startedAt.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) : '';
  const endTime = today.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  const duration = startedAt ? `${startTime} ~ ${endTime}` : endTime;
  const note = winnersArr.length ? '당첨자\n'+winnersArr.map((n,i)=>`${i+1}. ${n}`).join('\n') : '';
  const data = { title: title||'투표', date: dateStr, duration, note, files:[] };
  if(_voteDocId){
    await updateDoc(doc(_db,'contents',_voteDocId), data);
  } else {
    const ref = await addDoc(collection(_db,'contents'),{ ...data, createdAt: serverTimestamp() });
    _voteDocId = ref.id;
  }
}
window._resetVoteDoc = ()=>{ _voteDocId=null; };
window._upsertVoteResult = upsertVoteResult;
</script>

<script>
const CHANNEL_ID = '48070f8882233efa7aee52519fee8fca';

let voteOptions={}, voteCounts={}, voterMap={}, voteStartedAt=null, winnersLog=[];
let ws=null, wsConnected=false;
let wsReconnectTimer=null, wsAutoReconnect=true;
let channelIdCache=null;
let voteRunning=false, voteEnded=false;
let pileCount=0;

let optionRows=[{id:1,label:''},{id:2,label:''}];
let optRowId=3;

/* ── 항목 설정 ── */
function renderOptionInputs(){
  document.getElementById('options-wrap').innerHTML=optionRows.map((o,i)=>`
    <div class="option-row">
      <div class="option-num">${i+1}</div>
      <input class="option-input" id="opt-${o.id}" value="${o.label}" placeholder="항목 이름"/>
      ${optionRows.length>1?`<button class="btn-remove-opt" onclick="removeOption(${o.id})">×</button>`:'<div style="width:34px"></div>'}
    </div>`).join('');
}
function syncOptionInputs(){
  optionRows.forEach(o=>{ const el=document.getElementById(`opt-${o.id}`); if(el) o.label=el.value; });
}
function addOption(){
  syncOptionInputs();
  optionRows.push({id:optRowId++,label:''});
  renderOptionInputs();
}
function removeOption(id){
  if(optionRows.length<=1) return;
  syncOptionInputs();
  optionRows=optionRows.filter(o=>o.id!==id);
  renderOptionInputs();
}
function applyOptions(){
  optionRows.forEach(o=>{ o.label=document.getElementById(`opt-${o.id}`)?.value?.trim()||''; });
  voteOptions={};
  window.optionColors={};  // 항목 바뀌면 색상 초기화
  optionRows.forEach((o,i)=>{ voteOptions[String(i+1)]=o.label||String(i+1); });
  const nc={};
  Object.keys(voteOptions).forEach(k=>{ nc[k]=voteCounts[k]||0; });
  voteCounts=nc;
  renderResults();
}

/* ── 투표 제어 ── */
function updateVoteControls(){
  document.getElementById('btn-start').style.display=voteRunning?'none':'';
  document.getElementById('btn-reset').style.display=voteRunning?'none':'';
  document.getElementById('btn-end').style.display=voteRunning?'':'none';
  document.getElementById('status-right').classList.toggle('center',voteRunning);
}
function toggleVotePanels(){
  document.getElementById('anim-card').style.display=voteRunning?'':'none';
  const show=!voteRunning&&voteEnded;
  document.getElementById('stat-row').style.display=show?'':'none';
  document.getElementById('results-card').style.display=show?'':'none';
}
function startVote(){
  applyOptions();
  voteRunning=true; voteEnded=false;
  voteStartedAt=new Date(); winnersLog=[];
  pileCount=0; renderPile();
  updateVoteControls(); toggleVotePanels();
  document.getElementById('anim-card').scrollIntoView({behavior:'smooth',block:'center'});
  showToast('▶ 투표 진행 중');
}
function endVote(){
  voteRunning=false; voteEnded=true;
  updateVoteControls(); toggleVotePanels();
  // 웹소켓은 유지 (당첨자 채팅 수신용)
  showToast('⏹ 투표 중지 · 결과를 확인하세요');
}
function resetVote(){
  voteCounts={}; voterMap={}; voteEnded=false; pileCount=0; voteStartedAt=null; winnersLog=[];
  Object.keys(voteOptions).forEach(k=>{ voteCounts[k]=0; });
  renderPile(); updateStats(); renderResults(); toggleVotePanels(); closeVoterModal();
  wsAutoReconnect=true;
  if(!wsConnected) wsConnect();
  showToast('🗑 초기화 완료');
}

/* ── 투표용지 더미 렌더 ── */
// 각 용지의 고정 위치 기억 (시드 기반)
function seededRand(seed){ return ((seed*9301+49297)%233280)/233280; }

// 용지 위치 캐시 (한 번 정해지면 고정)
const PILE_STAGE_W = 800; // 고정 너비 기준 (offsetWidth 대신)
const VISIBLE_PILE = 60;

function addPilePaper(idx){
  const wrap=document.getElementById('pile-wrap');
  if(!wrap) return;
  const ww=wrap.parentElement?.offsetWidth||PILE_STAGE_W;
  const p=document.createElement('div');
  p.className='pile-paper';
  p.id=`pile-${idx}`;
  const rx=seededRand(idx*3+1);
  const rAngle=seededRand(idx*7+2);
  const xPos=Math.floor(rx*Math.max(ww-70,100))+8;
  const angle=(rAngle*28)-14;
  const stackY=Math.min(idx,VISIBLE_PILE)*1.5;
  p.style.cssText=`left:${xPos}px;bottom:${stackY}px;transform:rotate(${angle}deg);`;
  wrap.appendChild(p);
  // 오래된 용지 제거 (DOM 가볍게)
  while(wrap.children.length>VISIBLE_PILE){
    wrap.removeChild(wrap.firstChild);
  }
}

function renderPile(){
  const wrap=document.getElementById('pile-wrap');
  if(!wrap) return;
  // reset 시에만 전체 클리어, 나머지는 processBallotQueue에서 직접 추가
  if(pileCount===0) wrap.innerHTML='';
}

/* ── 투표용지 큐 처리 (몰림 대응) ── */
let ballotQueue=0, ballotRunning=false;

function launchBallot(){
  ballotQueue++;
  if(!ballotRunning) processBallotQueue();
}

function processBallotQueue(){
  if(ballotQueue===0){ ballotRunning=false; return; }
  ballotRunning=true;

  // 몰릴 때 최대 8장 동시 처리
  const batch=Math.min(ballotQueue,8);
  ballotQueue-=batch;

  const stage=document.getElementById('ballot-stage');
  if(!stage){ ballotRunning=false; return; }

  const sw=stage.offsetWidth, sh=stage.offsetHeight;

  for(let b=0;b<batch;b++){
    setTimeout(()=>{
      const paper=document.createElement('div');
      paper.className='ballot-fly';

      // 랜덤 X (바닥 전체에 분산), 위에서 떨어짐
      const targetX=Math.floor(Math.random()*(sw-60))+8;
      const targetY=sh-66; // 바닥 근처

      paper.style.cssText=`
        top:-70px;
        left:${targetX}px;
        opacity:1;
        transform:rotate(${Math.random()*20-10}deg);
      `;
      stage.appendChild(paper);

      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        const dur=260+Math.random()*100;
        paper.style.transition=`top ${dur}ms cubic-bezier(.55,0,1,1)`;
        paper.style.top=`${targetY}px`;

        // 낙하 완료 → ballot-fly를 그 자리에서 pile-paper로 변환 (위치 유지)
        setTimeout(()=>{
          const wrap=document.getElementById('pile-wrap');
          if(wrap){
            const ww=wrap.parentElement?.offsetWidth||800;
            const p=document.createElement('div');
            p.className='pile-paper';
            const angle=(Math.random()*28)-14;
            // ballot-fly의 left 위치를 pile-wrap 기준으로 변환
            const pileLeft=targetX; // stage와 pile-wrap이 같은 부모라 동일
            p.style.cssText=`left:${pileLeft}px;bottom:0px;transform:rotate(${angle}deg);position:absolute;`;
            wrap.appendChild(p);
            // 오래된 용지 정리
            while(wrap.children.length>60) wrap.removeChild(wrap.firstChild);
          }
          paper.remove();
          pileCount++;
        }, dur);
      }));
    }, b*40);
  }

  // 다음 큐 처리
  setTimeout(processBallotQueue, 500);
}

/* ── 웹소켓 ── */
async function wsConnect(){
  try {
    setWsStatus('connecting');
    const liveRes=await fetch('/api/live-status').then(r=>r.json());
    if(!liveRes?.content?.chatChannelId) throw new Error('방송 중이 아니에요');
    channelIdCache=liveRes.content.chatChannelId;
    const tokenRes=await fetch(`/api/access-token?channelId=${encodeURIComponent(channelIdCache)}`).then(r=>r.json());
    const accessToken=tokenRes?.content?.accessToken||'';
    ws=new WebSocket('wss://kr-ss1.chat.naver.com/chat');
    ws.onopen=()=>{
      ws.send(JSON.stringify({ver:'2',cmd:100,svcid:'game',cid:channelIdCache,bdy:{uid:null,devType:2001,accTkn:accessToken,auth:'READ'},tid:1}));
      setWsStatus(true);
    };
    ws.onmessage=onWsMsg;
    ws.onclose=()=>{ setWsStatus(false); if(wsAutoReconnect&&channelIdCache) wsReconnectTimer=setTimeout(wsConnect,5000); };
    ws.onerror=()=>setWsStatus('err');
  } catch(e){ setWsStatus('err'); showToast('⚠️ '+e.message); }
}
function wsDisconnect(){
  wsAutoReconnect=false; clearTimeout(wsReconnectTimer);
  if(ws) ws.close(); setWsStatus(false);
}
function onWsMsg(e){
  try {
    const msg=JSON.parse(e.data);
    if(msg.cmd===93101&&msg.bdy){
      const chats=Array.isArray(msg.bdy)?msg.bdy:[msg.bdy];
      chats.forEach(chat=>{
        if(!chat.msg||!chat.profile) return;
        const profile=typeof chat.profile==='string'?JSON.parse(chat.profile):chat.profile;
        const nick=profile.nickname||'익명';
        processVote(nick,chat.msg.trim());
        // 당첨자 채팅 감지
        if(currentWinner && nick===currentWinner){
          addWinnerChat(chat.msg.trim());
        }
      });
    }
    if(msg.cmd===0) ws.send(JSON.stringify({ver:'2',cmd:10000}));
  } catch(err){}
}

function addWinnerChat(msg){
  const feed=document.getElementById('winner-chat-feed');
  if(!feed) return;
  const div=document.createElement('div');
  div.className='winner-chat-msg';
  div.textContent=msg;
  feed.appendChild(div);
  feed.scrollTop=feed.scrollHeight;
}
setInterval(()=>{ if(ws&&ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify({ver:'2',cmd:10000})); },20000);



/* ── 테스트 모드 ── */
let testMode=false, testTimer=null;
const TEST_NICKS=['김철수','이영희','박민준','최수아','정하늘','강지우','윤도현','임채원','한소희','오준혁','신예진','류성민','장나연','백준서','전미래','송태양','노은별','문지호','안서연','황민재','조하린','고태경','남승연','구준표','변하은'];

function toggleTestMode(){
  testMode=!testMode;
  const btn=document.getElementById('btn-test');
  if(testMode){
    btn.style.background='#2ecc71'; btn.style.color='#000'; btn.textContent='🧪 테스트 중';
    if(!voteRunning) startVote();
    for(let i=0;i<10;i++) setTimeout(sendTestVote, i*80);
    testTimer=setInterval(sendTestVote, 700);
    showToast('🧪 테스트 모드 ON');
  } else {
    btn.style.background='#333'; btn.style.color='#888'; btn.textContent='🧪 테스트';
    clearInterval(testTimer);
    showToast('🧪 테스트 모드 OFF');
  }
}

function sendTestVote(){
  if(!voteRunning) return;
  const nick=TEST_NICKS[Math.floor(Math.random()*TEST_NICKS.length)];
  const keys=Object.keys(voteOptions);
  if(!keys.length) return;
  const num=keys[Math.floor(Math.random()*keys.length)];
  processVote(nick, `!투표${num}`);
  // 당첨자 오버레이 떠있을 때 채팅 시뮬레이션
  if(currentWinner && Math.random()<0.15){
    const msgs=['저 있어요!','왔습니다!','감사합니다!','오 진짜요?','ㅎㅎ'];
    addWinnerChat(msgs[Math.floor(Math.random()*msgs.length)]);
  }
}

/* ── 투표 처리 ── */
function processVote(nick,msg){
  if(!voteRunning) return;
  const m=msg.match(/^!투표\s*(\d+)$/);
  if(!m) return;
  const num=m[1];
  if(!voteOptions[num]&&Object.keys(voteOptions).length>0) return;
  const prev=voterMap[nick];
  if(prev===num) return;
  if(prev) voteCounts[prev]=Math.max(0,(voteCounts[prev]||0)-1);
  voterMap[nick]=num;
  voteCounts[num]=(voteCounts[num]||0)+1;
  updateStats(); renderResults();
  launchBallot();
}
function updateStats(){
  document.getElementById('total-votes').textContent=Object.values(voteCounts).reduce((s,v)=>s+v,0);
}
function renderResults(){
  const el=document.getElementById('results');
  const keys=Object.keys(voteOptions).length>0?Object.keys(voteOptions):Object.keys(voteCounts);
  if(!keys.length){ el.innerHTML=`<div class="empty"><div class="empty-icon">🗳</div><div>항목을 설정하고 투표를 시작하세요</div></div>`; return; }
  const total=Object.values(voteCounts).reduce((s,v)=>s+v,0)||1;
  const sorted=keys.slice().sort((a,b)=>(voteCounts[b]||0)-(voteCounts[a]||0));
  const maxV=voteCounts[sorted[0]]||0;
  // 항목별 고정 색상 (처음 렌더 시 생성, 이후 유지)
  if(!window.optionColors) window.optionColors={};
  keys.forEach(k=>{
    if(!window.optionColors[k]){
      const h=Math.floor(Math.random()*360);
      window.optionColors[k]=`hsl(${h},70%,58%)`;
    }
  });
  // 없어진 항목 정리
  Object.keys(window.optionColors).forEach(k=>{ if(!keys.includes(k)) delete window.optionColors[k]; });

  el.innerHTML=keys.map((k,i)=>{
    const cnt=voteCounts[k]||0, pct=Math.round(cnt/total*100), isFirst=cnt>0&&cnt===maxV;
    const col=window.optionColors[k];
    return `<div class="vote-item${isFirst?' first':''}" onclick="showOptionVoters('${k}')">
      <div class="vote-item-header">
        <div class="vote-item-name">
          <div class="vote-badge" style="${!isFirst?`background:${col}`:''}">${k}</div>
          ${voteOptions[k]||k}
        </div>
        <div class="vote-count">${cnt}표 (${pct}%)</div>
      </div>
      <div class="vote-bar-wrap"><div class="vote-bar" style="width:${pct}%;${!isFirst?`background:${col}`:''}" ></div></div>
    </div>`;
  }).join('');
}

/* ── 투표자 팝업 ── */
let currentRaffleKey=null, raffleVoters=[], winnersSet=new Set();

function showOptionVoters(key){
  const voters=Object.keys(voterMap).filter(n=>voterMap[n]===key);
  const label=voteOptions[key]||`${key}번`;
  currentRaffleKey=key;
  raffleVoters=voters;
  winnersSet=new Set(); // 항목 바뀌면 당첨 이력 초기화
  document.getElementById('modal-title').textContent=`${label} (${voters.length}명)`;
  document.getElementById('modal-voters').innerHTML=voters.length
    ?voters.map((n,i)=>`<span class="voter-chip" id="chip-${i}">${n}</span>`).join('')
    :`<div class="modal-empty">투표 인원 없음</div>`;
  const btn=document.getElementById('btn-raffle');
  btn.disabled=!voters.length;
  document.getElementById('voter-modal').classList.add('show');
}

/* ── 당첨자 뽑기 ── */
function startRaffle(){
  if(!raffleVoters.length) return;

  // 아직 안 뽑힌 사람만 대상
  const eligible = raffleVoters
    .map((n,i)=>({name:n, idx:i}))
    .filter(o=>!winnersSet.has(o.name));

  if(!eligible.length){
    showToast('🎉 모든 참가자가 당첨됐어요!');
    return;
  }

  const btn=document.getElementById('btn-raffle');
  btn.disabled=true;

  const chips=raffleVoters.map((_,i)=>document.getElementById(`chip-${i}`));
  const total=eligible.length; // 대상자만 카운트

  // 느린 구간 시작점 완전 랜덤 → 당첨자 결정
  const SLOW_STEPS=8;
  const slowDelays=[80,194,309,423,537,651,766,1000];
  const slowStartPos=Math.floor(Math.random()*total);
  const winnerEligibleIdx=(slowStartPos+SLOW_STEPS-1)%total;
  const winner=eligible[winnerEligibleIdx];

  // 빠른 구간: eligible 순서로 돌기, 3~7바퀴
  const laps=3+Math.floor(Math.random()*5);
  const fastFrames=total*laps+slowStartPos;
  const fastDelay=20+Math.floor(Math.random()*31);

  let frame=0, lastLit=-1;

  function litChip(eligiblePos, on){
    const chip=chips[eligible[eligiblePos%total].idx];
    if(!chip) return;
    if(on) chip.classList.add('lit');
    else chip.classList.remove('lit');
  }

  function step(){
    if(lastLit>=0) litChip(lastLit, false);

    if(frame>=fastFrames+SLOW_STEPS){
      // 당첨자 초록 고정
      const winChip=chips[winner.idx];
      if(winChip) winChip.classList.add('lit');
      winChip?.scrollIntoView({block:'nearest',behavior:'smooth'});
      setTimeout(()=>showWinner(winner.name), 800);
      btn.disabled=false;
      return;
    }

    const pos=frame<fastFrames
      ? frame%total
      : (slowStartPos+(frame-fastFrames))%total;

    litChip(pos, true);
    lastLit=pos;

    const delay=frame<fastFrames ? fastDelay : slowDelays[frame-fastFrames];
    frame++;
    setTimeout(step, delay);
  }

  step();
}

let currentWinner=null;

function showWinner(name){
  winnersSet.add(name);
  winnersLog.push(name);
  currentWinner=name;
  // Firebase 실시간 저장/업데이트
  const voteTitle=document.getElementById('vote-title-input')?.value?.trim()||'투표';
  if(window._upsertVoteResult) window._upsertVoteResult(voteTitle, [...winnersLog], voteStartedAt).catch(()=>{});
  const idx=raffleVoters.indexOf(name);
  if(idx>=0){
    const chip=document.getElementById(`chip-${idx}`);
    if(chip){ chip.classList.remove('lit'); chip.classList.add('won'); }
  }
  const key=currentRaffleKey;
  const label=voteOptions[key]||`${key}번`;
  const num=winnersSet.size;
  document.getElementById('winner-name').textContent=name;
  document.getElementById('winner-option').textContent=`${label} · ${num}번째 당첨자`;
  // 채팅 피드 초기화
  document.getElementById('winner-chat-feed').innerHTML='';
  document.getElementById('winner-overlay').classList.add('show');
}



function closeWinner(){
  document.getElementById('winner-overlay').classList.remove('show');
}
function closeVoterModal(){ document.getElementById('voter-modal').classList.remove('show'); }
function onModalBackdrop(e){ if(e.target.id==='voter-modal') closeVoterModal(); }

function setWsStatus(state){
  const dot=document.getElementById('ws-dot'), label=document.getElementById('ws-label');
  if(state===true){ wsConnected=true;wsAutoReconnect=true; dot.style.background=''; dot.className='ws-dot on'; label.textContent='채팅 연결됨'; }
  else if(state==='connecting'){ dot.className='ws-dot'; dot.style.background='#f59e0b'; label.textContent='연결 중...'; }
  else if(state==='err'){ wsConnected=false; dot.className='ws-dot err'; label.textContent='연결 실패'; voteRunning=false; updateVoteControls(); toggleVotePanels(); }
  else { wsConnected=false; dot.className='ws-dot'; dot.style.background=''; label.textContent='연결 안됨'; }
}
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

// 초기화
renderOptionInputs();
applyOptions();
renderResults();
updateVoteControls();
toggleVotePanels();
wsConnect();
</script>
