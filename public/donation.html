<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>후원 룰렛 | 첫째와둘째</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111111;
  --surface:#1c1c1c;
  --surface2:#252525;
  --border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.14);
  --accent:#2ecc71;
  --accent2:#27ae60;
  --text:#f0effe;
  --text2:#888888;
  --text3:#4a4a4a;
  --red:#ef4444;
  --amber:#f59e0b;
  --radius:14px;
  --radius-sm:10px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.wrap{position:relative;z-index:1;display:grid;grid-template-columns:280px 1fr;gap:20px;padding:0 26px 40px;max-width:1100px;margin:0 auto;transform:scale(.95);transform-origin:top center}
@media(max-width:900px){.wrap{grid-template-columns:1fr;padding:0 14px 30px}}
.header{text-align:center;margin-bottom:28px;position:relative;padding:36px 26px 0;max-width:1100px;margin-inline:auto}
.header-badge{display:inline-flex;align-items:center;gap:10px;padding:9px 16px;border-radius:20px;background:rgba(255,255,255,.06);font-size:16px;font-weight:800;color:#ccc;letter-spacing:.4px;margin-bottom:14px}
.brand-logo{width:26px;height:26px;border-radius:7px;object-fit:cover;display:block}
.header h1{font-size:44px;font-weight:900;letter-spacing:-.7px;margin-bottom:10px}
.header p{font-size:20px;color:#888}
.status-area{display:flex;align-items:center;gap:10px}
.status-dot{width:12px;height:12px;border-radius:50%;background:var(--text3);flex-shrink:0;transition:background .3s}
.status-dot.on{background:var(--accent);box-shadow:0 0 10px var(--accent);animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.status-text{font-size:14px;font-weight:700;color:var(--text2)}
.card{background:var(--surface);border:1px solid rgba(255,255,255,.07);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow)}
.card-title{font-size:14px;font-weight:800;color:var(--text3);letter-spacing:.4px;margin-bottom:14px}
.setting-group,.setting-row{display:flex;flex-direction:column;gap:8px}.setting-group{gap:14px}
.setting-label{font-size:13px;font-weight:700;color:var(--text2)}
.setting-input,.roulette-textarea{width:100%;padding:10px 13px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);font-size:14px;background:var(--surface2);color:var(--text);font-family:inherit;outline:none}
.setting-input:focus,.roulette-textarea:focus{border-color:var(--accent)}
.setting-hint{font-size:12px;color:var(--text3)}
.preset-btns{display:flex;gap:6px;flex-wrap:wrap}
.preset-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:12px;font-weight:700;cursor:pointer}
.preset-btn:hover,.preset-btn.active{background:#1a6e3e;border-color:var(--accent);color:var(--accent)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:10px;border:none;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;transition:opacity .15s;width:100%}
.btn:hover{opacity:.85}.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-connect,.btn-copy{background:var(--accent);color:#fff}.btn-stop{background:var(--red);color:#fff}.btn-open{background:var(--amber);color:#fff}
.btn-clear{background:#2a2a2a;color:#888;border:1.5px solid rgba(255,255,255,.1)}
.right-panel{display:flex;flex-direction:column;gap:16px}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.stat-box{background:var(--surface2);border-radius:var(--radius-sm);padding:14px;text-align:center}
.stat-num{font-size:24px;font-weight:900;color:var(--text);line-height:1}.stat-num.blurred{filter:blur(8px);user-select:none;cursor:pointer}
.stat-label{font-size:11px;color:var(--text2);margin-top:4px}
.edit-item,.feed-item{display:flex;align-items:center;gap:8px;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--surface2)}
.edit-item-name{flex:1;font-size:13px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.edit-item-cnt,.feed-cnt{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:#1a6e3e;color:var(--accent);flex-shrink:0}
.edit-item-input{flex:1;background:var(--surface);border:1.5px solid var(--accent);border-radius:6px;color:var(--text);font-family:inherit;font-size:13px;padding:4px 8px;outline:none;min-width:0}
.feed-wrap{display:flex;flex-direction:column;gap:8px;max-height:300px;overflow-y:auto}.feed-item{display:block}
.feed-row{display:flex;align-items:center;justify-content:space-between;gap:8px}.feed-nick,.feed-amt{font-size:13px;font-weight:700}.feed-amt{color:var(--accent);filter:blur(8px);user-select:none;cursor:pointer}.feed-amt.show{filter:none}
.feed-msg{font-size:12px;color:var(--text2);margin-top:4px}.feed-time,.feed-empty{font-size:11px;color:var(--text3)}
.collapsible-trigger{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.collapsible-body{overflow:hidden;max-height:0;transition:max-height .35s ease}.collapsible-body.open{max-height:500px}
</style>
</head>
<body>

<div class="header">
  <div class="header-badge"><img class="brand-logo" src="/logo.png" alt="첫째와둘째 로고"/>첫째와둘째</div>
  <h1>💸 후원 룰렛</h1>
  <p>실시간 후원을 룰렛 항목으로 자동 집계합니다</p>
  <div style="display:flex;justify-content:center;margin-top:10px">
    <div class="status-area">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-text" id="status-text">연결 안됨</span>
    </div>
  </div>
</div>

<div class="wrap">
  <!-- 왼쪽 -->
  <div style="display:flex;flex-direction:column;gap:16px">
    <div class="card">
      <div class="card-title">⚙️ 연결</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-connect" id="btn-start" onclick="startConnect()">▶ 시작</button>
        <button class="btn btn-stop" id="btn-stop" onclick="stopConnect()" style="display:none">⏹ 중단</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🎟 단위 금액</div>
      <div class="setting-group">
        <div class="setting-row">
          <div class="setting-label">단위 금액 (원)</div>
          <input class="setting-input" id="inp-unit" type="number" min="100" step="100" value="1000" oninput="updatePreview()">
          <div class="setting-hint" id="unit-preview">1,000원 = 1개</div>
        </div>
        <div class="setting-row">
          <div class="setting-label">빠른 설정</div>
          <div class="preset-btns">
            <button class="preset-btn active" onclick="setUnit(1000)">1,000원</button>
            <button class="preset-btn" onclick="setUnit(2000)">2,000원</button>
            <button class="preset-btn" onclick="setUnit(5000)">5,000원</button>
            <button class="preset-btn" onclick="setUnit(10000)">10,000원</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 오른쪽 -->
  <div class="right-panel">
    <div class="card">
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-num" id="stat-total-done">0</div>
          <div class="stat-label">총 후원 수</div>
        </div>
        <div class="stat-box" style="cursor:pointer" onclick="toggleAmt()" title="클릭해서 확인">
          <div class="stat-num blurred" id="stat-total-amt">0</div>
          <div class="stat-label">총 금액 👁</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="stat-total-items">0</div>
          <div class="stat-label">룰렛 항목 수</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div class="card-title" style="margin:0">🎰 룰렛 목록</div>
        <span style="font-size:11px;color:var(--text3)" id="item-count-label">0종류</span>
      </div>
      <div id="item-edit-list" style="display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto;margin-bottom:12px">
        <div style="color:var(--text3);text-align:center;padding:20px;font-size:12px">후원이 들어오면 자동으로 추가됩니다</div>
      </div>
      <textarea class="roulette-textarea" id="roulette-list" readonly></textarea>
      <div class="roulette-actions">
        <button class="btn btn-copy" onclick="copyList()">📋 복사</button>
        <button class="btn btn-open" onclick="openRoulette()">🎰 룰렛 열기</button>
        <button class="btn btn-clear" onclick="clearList()">🗑 초기화</button>
      </div>
    </div>
  </div>
</div>

<!-- 후원 내역 -->
<div style="max-width:1400px;margin:0 auto;padding:0 28px 40px">
  <div class="card">
    <div class="collapsible-trigger" onclick="toggleFeed()">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="font-size:13px;font-weight:700;color:var(--text)">💰 후원 내역</div>
        <span style="font-size:12px;font-weight:600;color:var(--accent);background:var(--accent-light);padding:2px 10px;border-radius:20px" id="feed-count">0건</span>
      </div>
      <span id="feed-arrow" style="font-size:12px;font-weight:600;color:var(--text2)">▼ 펼치기</span>
    </div>
    <div class="collapsible-body" id="feed-body">
      <div style="height:14px"></div>
      <div class="feed-wrap" id="feed-wrap">
        <div class="feed-empty">후원을 기다리는 중...</div>
      </div>
    </div>
  </div>
</div>

<script>
var CHANNEL_ID='48070f8882233efa7aee52519fee8fca';
var ws=null,connected=false,autoReconnect=false;
var channelIdCache=null,reconnectTimer=null;
var rouletteItems=[];
var totalDone=0,totalAmt=0,totalItems=0,feedCount=0;
var amtVisible=false,feedOpen=false;

function getUnit(){return Math.max(100,parseInt(document.getElementById('inp-unit').value)||1000);}
function updatePreview(){
  var u=getUnit();
  document.getElementById('unit-preview').textContent=u.toLocaleString()+'원 = 1개 · 5,000원이면 '+Math.floor(5000/u)+'개';
}
function setUnit(v){
  document.getElementById('inp-unit').value=v;
  document.querySelectorAll('.preset-btn').forEach(function(b){
    b.classList.toggle('active',parseInt(b.textContent.replace(/[^0-9]/g,''))===v);
  });
  updatePreview();
}
function setStatus(on){
  connected=on;
  document.getElementById('status-dot').className='status-dot'+(on?' on':'');
  document.getElementById('status-text').textContent=on?'수집 중':'연결 안됨';
  document.getElementById('btn-start').style.display=on?'none':'';
  document.getElementById('btn-stop').style.display=on?'':'none';
  document.getElementById('btn-start').disabled=false;
  document.getElementById('btn-start').textContent='▶ 시작';
}
async function startConnect(){
  var btn=document.getElementById('btn-start');
  btn.disabled=true;btn.textContent='연결 중...';
  try{
    var r=await fetch('/api/live-status');
    var data=await r.json();
    var chatChannelId=(data&&data.content&&data.content.chatChannelId)?data.content.chatChannelId:CHANNEL_ID;
    var accessToken=(data&&data.content&&data.content.accessToken)?data.content.accessToken:'';
    if(!accessToken){
      var tr=await fetch('/api/access-token?channelId='+encodeURIComponent(chatChannelId));
      var td=await tr.json();
      accessToken=(td&&td.content&&td.content.accessToken)?td.content.accessToken:'';
      chatChannelId=(td&&td.content&&td.content.chatChannelId)?td.content.chatChannelId:chatChannelId;
    }
    channelIdCache=chatChannelId;autoReconnect=true;
    connectWS(chatChannelId,accessToken);
  }catch(e){btn.disabled=false;btn.textContent='▶ 시작';}
}
function stopConnect(){
  autoReconnect=false;
  if(reconnectTimer)clearTimeout(reconnectTimer);
  if(ws)ws.close();
  setStatus(false);
}
function connectWS(channelId,accessToken){
  ws=new WebSocket('wss://kr-ss1.chat.naver.com/chat');
  ws.onopen=function(){
    ws.send(JSON.stringify({ver:'2',cmd:100,svcid:'game',cid:channelId,bdy:{uid:null,devType:2001,accTkn:accessToken,auth:'READ'},tid:1}));
    setStatus(true);
  };
  ws.onmessage=function(e){
    try{
      var msg=JSON.parse(e.data);
      if(msg.cmd===0)ws.send(JSON.stringify({ver:'2',cmd:10000}));
      if(msg.cmd===93102&&msg.bdy){
        var dons=Array.isArray(msg.bdy)?msg.bdy:[msg.bdy];
        dons.forEach(function(d){handleDonation(d);});
      }
    }catch(err){}
  };
  ws.onclose=function(){
    setStatus(false);
    if(autoReconnect&&channelIdCache){
      reconnectTimer=setTimeout(async function(){
        try{
          var tr=await fetch('/api/access-token?channelId='+encodeURIComponent(channelIdCache));
          var td=await tr.json();
          var tok=(td&&td.content&&td.content.accessToken)?td.content.accessToken:'';
          connectWS(channelIdCache,tok);
        }catch(ex){}
      },5000);
    }
  };
  ws.onerror=function(){};
}
function handleDonation(donation){
  try{
    var profile=typeof donation.profile==='string'?JSON.parse(donation.profile):donation.profile;
    var extras=typeof donation.extras==='string'?JSON.parse(donation.extras):donation.extras;
    var nick=(profile&&profile.nickname)?profile.nickname:'익명의 후원자';
    var amt=Number((extras&&extras.payAmount)?extras.payAmount:0);
    if(!amt)return;
    var msgText='';
    if(extras&&extras.donationText)msgText=extras.donationText;
    else if(extras&&extras.message)msgText=extras.message;
    else if(donation.msg)msgText=donation.msg;
    msgText=msgText.trim();
    var unit=getUnit(),count=Math.floor(amt/unit);
    if(count<1)return;
    var time=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    var entry=msgText||nick;
    for(var i=0;i<count;i++)rouletteItems.push(entry);
    totalDone++;totalAmt+=amt;totalItems+=count;
    addFeedItem(nick,amt,entry,count,time);
    updateStats();updateRouletteList();
  }catch(e){}
}
function addFeedItem(nick,amt,entry,count,time){
  var wrap=document.getElementById('feed-wrap');
  var empty=wrap.querySelector('.feed-empty');
  if(empty)empty.remove();
  var d=document.createElement('div');
  d.className='feed-item';
  d.innerHTML='<div class="feed-row">'
    +'<span class="feed-nick">💰 '+nick+'</span>'
    +'<span class="feed-cnt">+'+count+'개</span>'
    +'<span class="feed-amt" onclick="this.classList.toggle(\'show\')" title="클릭해서 확인">'+amt.toLocaleString()+'원</span>'
    +'</div>'
    +'<div class="feed-msg">🎰 '+entry+(count>1?' × '+count:'')+'</div>'
    +'<div class="feed-time">'+time+'</div>';
  wrap.insertBefore(d,wrap.firstChild);
  feedCount++;
  document.getElementById('feed-count').textContent=feedCount+'건';
}
function toggleFeed(){
  feedOpen=!feedOpen;
  document.getElementById('feed-body').classList.toggle('open',feedOpen);
  document.getElementById('feed-arrow').textContent=feedOpen?'▲ 접기':'▼ 펼치기';
}
function updateStats(){
  document.getElementById('stat-total-done').textContent=totalDone;
  document.getElementById('stat-total-amt').textContent=totalAmt.toLocaleString();
  document.getElementById('stat-total-items').textContent=totalItems;
}
function toggleAmt(){
  amtVisible=!amtVisible;
  document.getElementById('stat-total-amt').classList.toggle('blurred',!amtVisible);
}
function updateRouletteList(){
  var countMap={};
  rouletteItems.forEach(function(item){countMap[item]=(countMap[item]||0)+1;});
  var entries=Object.keys(countMap).map(function(k){return countMap[k]>1?k+'*'+countMap[k]:k;});
  document.getElementById('roulette-list').value=entries.join(',');
  renderEditList(countMap);
}
function renderEditList(countMap){
  var el=document.getElementById('item-edit-list');
  var entries=Object.keys(countMap).map(function(k){return[k,countMap[k]];}).sort(function(a,b){return b[1]-a[1];});
  if(entries.length===0){
    el.innerHTML='<div style="color:var(--text3);text-align:center;padding:20px;font-size:12px">후원이 들어오면 자동으로 추가됩니다</div>';
    document.getElementById('item-count-label').textContent='0종류';
    return;
  }
  document.getElementById('item-count-label').textContent=entries.length+'종류 / 총 '+rouletteItems.length+'개';
  el.innerHTML=entries.map(function(e,i){
    var item=e[0],cnt=e[1];
    var safe=item.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    var safeJ=item.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return '<div class="edit-item" id="edit-row-'+i+'">'
      +'<span class="edit-item-name" title="'+safe+'">'+safe+'</span>'
      +'<span class="edit-item-cnt">'+cnt+'개</span>'
      +'<button class="edit-btn edit-btn-edit" onclick="startEdit('+i+',\''+safeJ+'\','+cnt+')" title="수정">✏️</button>'
      +'<button class="edit-btn edit-btn-del" onclick="deleteItem(\''+safeJ+'\','+cnt+')" title="삭제">🗑</button>'
      +'</div>';
  }).join('');
}
function startEdit(i,oldName,cnt){
  var row=document.getElementById('edit-row-'+i);
  var safe=oldName.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  var safeJ=oldName.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  row.innerHTML='<input class="edit-item-input" id="edit-input-'+i+'" value="'+safe+'">'
    +'<span class="edit-item-cnt">'+cnt+'개</span>'
    +'<button class="edit-btn edit-btn-ok" onclick="confirmEdit('+i+',\''+safeJ+'\','+cnt+')" title="확인">✅</button>'
    +'<button class="edit-btn edit-btn-del" onclick="updateRouletteList()" title="취소">✖</button>';
  var inp=document.getElementById('edit-input-'+i);
  inp.focus();inp.select();
  inp.onkeydown=function(ev){
    if(ev.key==='Enter')confirmEdit(i,oldName,cnt);
    if(ev.key==='Escape')updateRouletteList();
  };
}
function confirmEdit(i,oldName,cnt){
  var inp=document.getElementById('edit-input-'+i);
  if(!inp)return;
  var newName=inp.value.trim();
  if(!newName)return;
  rouletteItems=rouletteItems.map(function(item){return item===oldName?newName:item;});
  updateRouletteList();
}
function deleteItem(name,cnt){
  if(!confirm('"'+name+'" 항목을 삭제할까요? ('+cnt+'개)'))return;
  rouletteItems=rouletteItems.filter(function(item){return item!==name;});
  totalItems-=cnt;
  document.getElementById('stat-total-items').textContent=totalItems;
  updateRouletteList();
}
function copyList(){
  var val=document.getElementById('roulette-list').value;
  if(!val){alert('룰렛 목록이 비어있어요');return;}
  navigator.clipboard.writeText(val).then(function(){alert('📋 복사됐어요!');});
}
function openRoulette(){
  var list=document.getElementById('roulette-list').value;
  var url='https://lazygyu.github.io/roulette/';
  if(list){
    navigator.clipboard.writeText(list).then(function(){
      alert('📋 목록이 복사됐어요!\n룰렛 창이 열리면 이름 입력칸에 붙여넣기(Ctrl+V) 해주세요.');
      window.open(url,'_blank');
    }).catch(function(){window.open(url,'_blank');});
  }else{
    window.open(url,'_blank');
  }
}
function clearList(){
  if(!confirm('룰렛 목록과 기록을 모두 초기화할까요?'))return;
  rouletteItems=[];
  totalDone=0;totalAmt=0;totalItems=0;feedCount=0;
  document.getElementById('roulette-list').value='';
  document.getElementById('feed-wrap').innerHTML='<div class="feed-empty">후원을 기다리는 중...</div>';
  document.getElementById('feed-count').textContent='0건';
  document.getElementById('item-edit-list').innerHTML='<div style="color:var(--text3);text-align:center;padding:20px;font-size:12px">후원이 들어오면 자동으로 추가됩니다</div>';
  document.getElementById('item-count-label').textContent='0종류';
  updateStats();
}
setInterval(function(){
  if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({ver:'2',cmd:10000}));
},20000);
updatePreview();
</script>
</body>
</html>
